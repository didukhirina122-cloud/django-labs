<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>

    <br>
    <a href="{% url 'home' %}">На головну</a>
   <hr>
<h3>Актуальні пропозиції:</h3>

<ul>
    {% for product in products %}
        <li>
            <strong>{{ product.name }}</strong> — {{ product.price }} грн.
            <br>
            <i>Категорія: {{ product.category.name }}</i>
        </li>
    {% empty %}
        <li>На даний момент товарів немає в наявності.</li>
    {% endfor %}
</ul>
</body>
</html>
